<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensors, Actuators &amp; Robots — Arduino Lab · Part 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#20406e; --navy2:#2c548c; --ink:#1a2540; --ink-soft:#3a4763;
    --teal:#17a099; --teal-d:#0f7a74; --teal-l:#e4f5f3;
    --amber:#e8ab47; --amber-d:#b97f1f; --amber-l:#fbf2df;
    --paper:#f6f9fc; --line:#dee6ee; --card:#ffffff; --muted:#5f6b83;
    --green:#2fa171; --green-l:#e3f5ec; --red:#d16565; --red-l:#faeaea;
    --sh:0 2px 6px rgba(16,29,58,.05), 0 14px 34px -18px rgba(16,29,58,.18);
    --sh-sm:0 1px 3px rgba(16,29,58,.06), 0 6px 16px -10px rgba(16,29,58,.16);
    --r:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',system-ui,sans-serif;color:var(--ink);
    background:var(--paper);
    background-image:linear-gradient(rgba(23,160,153,.05) 1px, transparent 1px),linear-gradient(90deg, rgba(23,160,153,.05) 1px, transparent 1px);
    background-size:26px 26px;
    min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden;
  }
  h1,h2,h3{font-family:'Space Grotesk','Inter',sans-serif}
  .mono{font-family:'JetBrains Mono',monospace}
  .id{font-style:italic;color:var(--teal-d);font-weight:500}
  svg{display:block}

  .topbar{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;gap:14px;
    padding:12px clamp(14px,4vw,40px);background:rgba(246,249,252,.9);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-family:'Space Grotesk';color:var(--navy);font-size:15px;white-space:nowrap}
  .brand .bchip{width:32px;height:32px;border-radius:10px;background:var(--teal);display:grid;place-items:center;flex:none;box-shadow:var(--sh-sm)}
  .brand .bchip svg{width:18px;height:18px}
  .progress-wrap{flex:1;height:7px;background:#e2e9f0;border-radius:99px;overflow:hidden;min-width:50px}
  .progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--amber));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .score-chip{display:flex;align-items:center;gap:8px;background:var(--navy);color:#fff;padding:8px 15px;border-radius:99px;
    font-weight:700;font-size:14px;white-space:nowrap;box-shadow:var(--sh-sm);position:relative}
  .score-chip svg{width:15px;height:15px}
  .score-chip.bump{animation:bump .5s ease}
  @keyframes bump{0%{transform:scale(1)}35%{transform:scale(1.15)}100%{transform:scale(1)}}
  .float-pts{position:absolute;top:-10px;right:10px;font-weight:800;font-size:15px;pointer-events:none;
    font-family:'Space Grotesk';animation:floatUp 1.1s ease forwards}
  .float-pts.big{color:var(--green)} .float-pts.small{color:var(--amber-d)}
  @keyframes floatUp{0%{opacity:0;transform:translateY(8px)}20%{opacity:1}100%{opacity:0;transform:translateY(-26px)}}

  .stage{max-width:1040px;margin:0 auto;padding:100px clamp(14px,4vw,34px) 116px;min-height:100vh;display:flex;align-items:center}
  .slide{display:none;width:100%}
  .slide.active{display:block;animation:slideIn .55s cubic-bezier(.2,.75,.25,1)}
  @keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .slide.active .points>li{opacity:0;animation:rise .5s cubic-bezier(.2,.75,.25,1) forwards}
  .slide.active .points>li:nth-child(1){animation-delay:.08s}
  .slide.active .points>li:nth-child(2){animation-delay:.16s}
  .slide.active .points>li:nth-child(3){animation-delay:.24s}
  .slide.active .points>li:nth-child(4){animation-delay:.32s}
  .slide.active .opt{opacity:0;animation:rise .45s cubic-bezier(.2,.75,.25,1) forwards}
  .slide.active .opt:nth-child(1){animation-delay:.08s}
  .slide.active .opt:nth-child(2){animation-delay:.16s}
  .slide.active .opt:nth-child(3){animation-delay:.24s}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}
    .slide.active .points>li,.slide.active .opt{opacity:1!important}}

  .eyebrow{font-family:'Space Grotesk';font-weight:600;letter-spacing:.15em;font-size:12px;text-transform:uppercase;
    color:var(--teal-d);margin-bottom:14px;display:flex;align-items:center;gap:9px}
  .eyebrow .dot{width:7px;height:7px;border-radius:99px;background:var(--amber)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:clamp(22px,4vw,40px)}
  .headicon{width:56px;height:56px;border-radius:16px;background:var(--teal);display:grid;place-items:center;box-shadow:var(--sh-sm);margin-bottom:16px}
  .headicon svg{width:29px;height:29px}
  .headicon.amber{background:var(--amber)} .headicon.navy{background:var(--navy)}
  h2.title{font-size:clamp(24px,4.2vw,38px);font-weight:700;line-height:1.08;letter-spacing:-.01em;color:var(--ink)}
  .title-id{font-size:clamp(15px,2.3vw,19px);margin-top:5px;margin-bottom:6px}
  .lead{color:var(--muted);font-size:clamp(14.5px,2vw,16.5px);max-width:64ch}

  .points{list-style:none;display:grid;gap:11px;margin-top:20px}
  .points li{display:flex;gap:13px;align-items:flex-start;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:13px 15px}
  .points li .tick{flex:none;width:26px;height:26px;border-radius:8px;background:var(--teal-l);color:var(--teal-d);display:grid;place-items:center;margin-top:1px}
  .points li .tick svg{width:14px;height:14px}
  .points li b{color:var(--ink);font-weight:600;display:block;font-size:15px}
  .points li .id{font-size:13.5px;display:block;margin-top:1px}

  .split{display:grid;grid-template-columns:1fr;gap:24px;align-items:center}
  @media(min-width:780px){.split{grid-template-columns:1.05fr .95fr}}
  .visual{display:grid;place-items:center;background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:22px;min-height:200px}
  .visual svg{max-width:100%;height:auto}

  .photo{margin:0}
  .ph-wrap{position:relative;border-radius:var(--r);overflow:hidden;border:1px solid var(--line);
    background:linear-gradient(120deg,#eef3f8,#f7fafc);aspect-ratio:4/3;box-shadow:var(--sh)}
  .ph-wrap img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .6s ease}
  .ph-wrap img.ld{opacity:1}
  .ph-wrap .ph-fb{position:absolute;inset:0;display:none;place-items:center;padding:20px}
  .ph-wrap.fail img{display:none}
  .ph-wrap.fail .ph-fb{display:grid}
  .photo figcaption{font-size:12.5px;color:var(--muted);margin-top:8px;line-height:1.45}
  .photo .credit{display:block;font-size:11px;color:#93a0b5}

  .pro{display:inline-flex;align-items:flex-start;gap:10px;background:var(--amber-l);border:1px solid #f0dfb4;
    border-radius:13px;padding:11px 15px;margin-top:16px;font-size:13.5px;color:var(--ink)}
  .pro .pb{flex:none;background:var(--amber);color:#3a2600;font-family:'Space Grotesk';font-weight:700;font-size:10.5px;
    letter-spacing:.08em;border-radius:7px;padding:3px 8px;margin-top:1px}
  .pro .id{display:block;font-size:12.5px}

  .dark-panel{background:
      radial-gradient(120% 130% at 88% -10%, #3f78bf 0%, transparent 55%),
      radial-gradient(90% 100% at -5% 110%, #1f9c92 0%, transparent 50%),
      var(--navy);
    color:#fff;border:none;position:relative;overflow:hidden;border-radius:26px;padding:clamp(30px,6vw,62px)}
  .dark-panel:before{content:"";position:absolute;inset:0;
    background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);
    background-size:30px 30px;opacity:.6}
  .dark-panel>*{position:relative;z-index:1}
  .blob{position:absolute;border-radius:50%;z-index:0;animation:drift 9s ease-in-out infinite alternate}
  .b1{width:260px;height:260px;background:rgba(23,160,153,.25);top:-80px;right:-50px}
  .b2{width:190px;height:190px;background:rgba(232,171,71,.16);bottom:-60px;left:-40px;animation-delay:2.5s}
  @keyframes drift{from{transform:translate(0,0)}to{transform:translate(-16px,14px)}}
  .dark-panel .eyebrow{color:var(--amber)}
  .cover h1{font-size:clamp(30px,5.6vw,52px);line-height:1.04;font-weight:700;letter-spacing:-.02em}
  .cover .h1-id{color:var(--amber);font-size:clamp(16px,2.8vw,23px);margin-top:8px;font-style:italic;font-weight:600}
  .cover p{color:#dbe6f5;max-width:58ch;margin-top:18px;font-size:clamp(14.5px,2vw,16.5px)}
  .cover p .id{color:#9fe8de}
  .cta-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:28px;align-items:center}
  .meta-pill{display:inline-flex;gap:8px;align-items:center;color:#c4d5ec;font-size:12.5px;border:1px solid rgba(255,255,255,.2);border-radius:99px;padding:7px 13px}

  .btn{font-family:'Space Grotesk';font-weight:600;font-size:15.5px;border:none;cursor:pointer;border-radius:13px;
    padding:13px 24px;display:inline-flex;align-items:center;gap:10px;
    transition:transform .15s ease,box-shadow .2s ease,background .15s;box-shadow:var(--sh-sm)}
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--amber);color:#3a2600}
  .btn-primary:hover{background:var(--amber-d);color:#fff}
  .btn-teal{background:var(--teal);color:#fff}
  .btn-teal:hover{background:var(--teal-d)}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);box-shadow:none}
  .btn-ghost:hover{background:#fff;border-color:#b9cbd9;transform:none}
  .btn svg{width:17px;height:17px}
  .btn[disabled]{opacity:.35;cursor:not-allowed;transform:none}

  .qnum{font-family:'Space Grotesk';font-weight:700;color:var(--amber-d);font-size:12.5px;letter-spacing:.1em;text-transform:uppercase}
  .quiz h2{font-size:clamp(20px,3.3vw,29px);margin-top:6px;line-height:1.18;color:var(--ink)}
  .q-id{margin:6px 0 4px;font-size:15.5px}
  .opts{display:grid;gap:12px;margin-top:20px}
  .opt{text-align:left;background:#fff;border:2px solid var(--line);border-radius:14px;padding:14px 16px;cursor:pointer;
    font-size:15.5px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:13px;font-family:inherit;
    transition:border-color .15s,background .15s,transform .12s;box-shadow:var(--sh-sm)}
  .opt:hover:not(.locked){border-color:var(--teal);background:var(--teal-l);transform:translateX(3px)}
  .opt .key{flex:none;width:30px;height:30px;border-radius:9px;background:var(--paper);color:var(--ink-soft);
    display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:14px}
  .opt .otext .id{display:block;font-size:13px;font-weight:500;margin-top:1px}
  .opt.correct{border-color:var(--green);background:var(--green-l);animation:pop .35s ease}
  .opt.correct .key{background:var(--green);color:#fff}
  .opt.wrong{border-color:var(--red);background:var(--red-l);animation:shake .4s ease}
  .opt.wrong .key{background:var(--red);color:#fff}
  .opt.locked{cursor:default;transform:none}
  .opt.dim{opacity:.45}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.025)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}55%{transform:translateX(5px)}80%{transform:translateX(-3px)}}
  .feedback{margin-top:16px;border-radius:14px;padding:14px 17px;display:none;align-items:flex-start;gap:12px;font-size:14.5px}
  .feedback.show{display:flex;animation:slideIn .3s ease}
  .feedback.ok{background:var(--green-l);border:1px solid #bfe3d0}
  .feedback.no{background:var(--amber-l);border:1px solid #f0dfb4}
  .feedback .fi{flex:none;width:26px;height:26px;border-radius:8px;display:grid;place-items:center;color:#fff;font-weight:800}
  .feedback .fi svg{width:14px;height:14px}
  .feedback.ok .fi{background:var(--green)}
  .feedback.no .fi{background:var(--amber-d)}
  .feedback b{display:block;color:var(--ink)}
  .feedback .id{font-size:13px}

  .task-tag{display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:#fff;font-family:'Space Grotesk';
    font-weight:600;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;padding:7px 14px;border-radius:99px;margin-bottom:14px}
  .task-tag.build{background:var(--teal-d)}
  .task-tag svg{width:14px;height:14px}
  .status-tag{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-family:'Space Grotesk';
    padding:7px 16px;border-radius:99px;font-size:13.5px;margin-top:8px}
  .status-tag.off{background:var(--red-l);color:var(--red)}
  .status-tag.on{background:var(--green-l);color:var(--green)}
  .status-tag.mid{background:var(--amber-l);color:var(--amber-d)}
  .hint{color:var(--muted);font-size:13.5px;margin-top:10px}
  .gstage{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:20px;text-align:center}

  .chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
  .chip{background:#fff;border:2px solid var(--line);border-radius:12px;padding:11px 15px;cursor:pointer;font-weight:600;
    font-family:'JetBrains Mono';font-size:14px;color:var(--ink);transition:all .15s;box-shadow:var(--sh-sm)}
  .chip:hover:not(.used){border-color:var(--teal);transform:translateY(-2px)}
  .chip.used{opacity:.25;pointer-events:none}
  .chip.err{animation:shake .4s ease;border-color:var(--red);background:var(--red-l)}
  .seq{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:18px;min-height:52px;
    background:var(--paper);border:1px dashed #b9c8d6;border-radius:14px;padding:12px}
  .seq .slot{background:var(--teal);color:#fff;border-radius:10px;padding:9px 13px;font-family:'JetBrains Mono';
    font-size:13.5px;font-weight:600;animation:pop .3s ease}
  .seq .arrowsep svg{width:16px;height:16px;color:var(--muted)}
  .seq .placeholder{color:var(--muted);font-size:13.5px;font-style:italic}

  .match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
  .mcol{display:grid;gap:10px;align-content:start}
  .mitem{background:#fff;border:2px solid var(--line);border-radius:13px;padding:12px 13px;cursor:pointer;font-weight:600;
    font-size:14px;text-align:left;font-family:inherit;color:var(--ink);transition:border-color .15s,background .15s;box-shadow:var(--sh-sm)}
  .mitem .id{display:block;font-size:12px;font-weight:500}
  .mitem:hover:not(.done){border-color:var(--teal)}
  .mitem.sel{border-color:var(--amber);background:var(--amber-l)}
  .mitem.done{border-color:var(--green);background:var(--green-l);cursor:default;animation:pop .3s ease}
  .mitem.err{animation:shake .4s ease;border-color:var(--red)}
  .mitem .mono{font-size:15px}

  .code{background:#0c1527;border-radius:16px;padding:20px;overflow:auto;box-shadow:var(--sh)}
  .code .fname{color:#7e93c4;font-size:12.5px;margin-bottom:10px;font-family:'JetBrains Mono'}
  .code pre{font-family:'JetBrains Mono',monospace;font-size:13.5px;line-height:1.85;color:#e6edf3}
  .kw{color:#6fb1ff}.fn{color:#8fd6ce}.num{color:#ecba63}.cm{color:#7d9a76}.con{color:#c9a2e8}
  .blank{background:#1d2b4d;border:2px dashed #5b76ad;border-radius:7px;padding:1px 10px;color:#c4d3ee;font-weight:700}
  .blank.filled{border-style:solid;border-color:var(--teal);color:#8fe2d8}
  .fillopts{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
  .fillopt{background:#fff;border:2px solid var(--line);border-radius:12px;padding:11px 15px;cursor:pointer;font-weight:600;
    font-family:'JetBrains Mono';font-size:13.5px;color:var(--ink);transition:all .15s;box-shadow:var(--sh-sm)}
  .fillopt:hover:not(.locked){border-color:var(--teal);transform:translateY(-2px)}
  .fillopt.correct{border-color:var(--green);background:var(--green-l);animation:pop .35s ease}
  .fillopt.wrong{animation:shake .4s ease;border-color:var(--red);background:var(--red-l)}
  .fillopt.locked{cursor:default;pointer-events:none}

  .sim{display:grid;gap:18px;grid-template-columns:1fr}
  @media(min-width:780px){.sim{grid-template-columns:1fr 1fr}}
  .bigread{font-family:'Space Grotesk';font-weight:700;font-size:clamp(32px,5.6vw,46px);color:var(--ink);line-height:1}
  .bigread small{font-size:.42em;color:var(--muted);font-weight:600}
  .zone{position:relative;height:16px;border-radius:99px;background:#e2e9f0;margin:16px 8px 6px;overflow:visible}
  .zone .safe{position:absolute;top:0;bottom:0;background:rgba(47,161,113,.32);border:1.5px solid var(--green);border-radius:99px}
  .zone .needle{position:absolute;top:-5px;width:4px;height:26px;background:var(--navy);border-radius:3px;transition:left .15s ease}
  .zlbl{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin:2px 10px 0}
  .formula{font-family:'JetBrains Mono';font-weight:700;font-size:clamp(16px,2.4vw,20px);color:var(--teal-d);
    background:var(--teal-l);border-radius:12px;padding:9px 15px;display:inline-block;margin-top:10px}
  .slider-row{display:flex;align-items:center;gap:12px;margin-top:14px;justify-content:flex-start;flex-wrap:wrap}
  input[type=range]{accent-color:var(--teal);width:min(230px,58%)}
  .rowval{font-family:'JetBrains Mono';font-weight:700;color:var(--teal-d);font-size:14px;min-width:80px;text-align:left}
  .dial{width:110px;height:110px;border-radius:50%;background:#fff;border:4px solid var(--line);margin:10px auto;position:relative;box-shadow:var(--sh-sm)}
  .dial .needle2{position:absolute;left:50%;top:50%;width:4px;height:44px;background:var(--teal-d);border-radius:3px;transform-origin:bottom center;transform:translate(-50%,-100%) rotate(0deg);transition:transform .12s}
  .servo-arm{width:8px;height:70px;background:var(--teal-d);border-radius:4px;position:absolute;left:50%;bottom:50%;transform-origin:bottom center;transform:translateX(-50%) rotate(0deg);transition:transform .12s}
  .servo-base{width:56px;height:56px;border-radius:50%;background:#fff;border:4px solid var(--line);position:relative;margin:0 auto}
  .colorsw{width:120px;height:120px;border-radius:16px;margin:10px auto;border:4px solid #fff;box-shadow:var(--sh)}
  .simled{width:70px;height:70px;border-radius:50%;background:#cfd6e0;border:4px solid #aab4c2;margin:14px auto 6px;
    transition:background .18s,border-color .18s,box-shadow .18s}
  .simled.on{background:var(--amber);border-color:var(--amber-d);box-shadow:0 0 0 10px rgba(232,171,71,.18),0 0 26px rgba(232,171,71,.5)}

  .results{text-align:center}
  .results h2{font-size:clamp(25px,5vw,40px)}
  .ring-wrap{display:grid;place-items:center;margin:20px 0 8px}
  .ring{position:relative;width:190px;height:190px}
  .ring svg{transform:rotate(-90deg)}
  .ring .rc{transition:stroke-dashoffset 1.5s cubic-bezier(.2,.7,.2,1)}
  .ring .center{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
  .ring .big{font-family:'Space Grotesk';font-weight:700;font-size:40px;line-height:1;color:#fff}
  .ring .sub{color:#9fe8de;font-size:12.5px;margin-top:5px;font-weight:600}
  .level{display:inline-flex;gap:9px;align-items:center;background:var(--amber);color:#3a2600;font-family:'Space Grotesk';
    font-weight:700;padding:9px 20px;border-radius:99px;font-size:16px;margin-top:6px}
  .level svg{width:16px;height:16px}
  .res-line{color:#dbe6f5;max-width:54ch;margin:14px auto 0;font-size:15px}
  .res-line .id{color:#9fe8de}
  .stat-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:22px}
  .stat{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);border-radius:13px;padding:11px 18px;min-width:104px}
  .stat .sv{font-family:'Space Grotesk';font-weight:700;font-size:21px}

function rContent(key){
  const s = CONTENT[key];
  let side;
  if(s.photoKey) side = photo(s.photoKey, FB.sensor, s.title, s.titleId);
  else if(s.svg) side = `<div class="visual">${SVGS[s.svg]}</div>`;
  else side = `<div class="visual">${boxSVG('#16407a', s.title.split(':')[0], 'component', 220,150)}</div>`;
  return `<section class="slide"><div class="card"><div class="split">
    <div>
      <div class="headicon ${s.ic||''}">${I[s.icon]}</div>
      <div class="eyebrow"><span class="dot"></span>${s.kicker}</div>
      <h2 class="title">${s.title}</h2><div class="title-id id">${s.titleId}</div>
      <p class="lead">${s.lead.en} <span class="id">/ ${s.lead.id}</span></p>
      ${pointsList(s.points)}
      ${proBox(s.pro)}
    </div>
    ${side}
  </div></div></section>`;
}

    {type:'content',key:'analog'},
    {type:'lab',fn:rLabPot},
    {type:'content',key:'divider'},
    {type:'content',key:'ldr'},
    {type:'lab',fn:rLabNight},
    {type:'quiz'},{type:'quiz'},
    {type:'content',key:'button'},
    {type:'order',data:ORDERS[0]},
    {type:'content',key:'dht'},
    {type:'fill',data:FILLS[0]},
    {type:'content',key:'sonar'},
    {type:'lab',fn:rLabDist},
    {type:'content',key:'pir'},
    {type:'match',data:MATCH_SENSORS},
    {type:'quiz'},{type:'quiz'},
    {type:'content',key:'servo'},
    {type:'lab',fn:rLabServo},
    {type:'content',key:'motor'},
    {type:'order',data:ORDERS[1]},
    {type:'content',key:'buzzer'},
    {type:'fill',data:FILLS[3]},
    {type:'content',key:'rgb'},
    {type:'lab',fn:rLabColor},
    {type:'content',key:'relay'},
    {type:'quiz'},{type:'quiz'},
    {type:'content',key:'vars'},
    {type:'fill',data:FILLS[1]},
    {type:'content',key:'ifelse'},
    {type:'fill',data:FILLS[2]},
    {type:'content',key:'logic'},
    {type:'predict',data:PREDICTS[0]},
    {type:'content',key:'loops'},
    {type:'predict',data:PREDICTS[1]},
    {type:'content',key:'funcs'},
    {type:'order',data:ORDERS[2]},
    {type:'content',key:'serial'},
    {type:'predict',data:PREDICTS[2]},
    {type:'content',key:'robotintro'},
    {type:'content',key:'linefollow'},
    {type:'fill',data:FILLS[4]},
    {type:'content',key:'obstacle'},
    {type:'predict',data:PREDICTS[3]},
    {type:'quiz'},{type:'quiz'},
    {type:'content',key:'roadmap'},
    {type:'gallery'},
    {type:'results'},
  ];
  QUIZ_OFFSET=0;
}

let quizIdxMap=[]; // slide-index -> QUIZ pool index
function mount(){
  buildDeck();
  answered={};attempts={};firstTry=0;g={doneMap:{},triesMap:{},orderState:{},matchState:{}};
  let quizPool = shuffle(QUIZ.map((_,i)=>i));
  quizIdxMap=[];
  const root=document.getElementById('slides');root.innerHTML='';
  slides.forEach((s,idx)=>{
    let h='';
    switch(s.type){
      case 'cover':h=rCover();break;
      case 'content':h=rContent(s.key);break;
      case 'lab':h=s.fn();break;
      case 'order':h=rOrder(s.data);break;
      case 'fill':h=rFill(s.data);break;
      case 'match':h=rMatch(s.data);break;
      case 'predict':h=rPredict(s.data);break;
      case 'quiz':{
        const qi=quizPool.shift();
        quizIdxMap[idx]=qi;
        h=rQuizAt(idx,qi);
        break;
      }
      case 'gallery':h=rGallery();break;
      case 'results':h=rResults();break;
    }
    root.appendChild(el(h));
  });
  document.getElementById('totNum').textContent=slides.length;
  showSlide(0);
  potUpdate();nightUpdate();distUpdate();servoUpdate();colorUpdate();
}
function rQuizAt(idx,qi){
  const s=QUIZ[qi];
  const opts=shuffle(s.opts.map(o=>({...o})));
  return `<section class="slide"><div class="card quiz">
    <div class="qnum">Checkpoint · Kuis</div>
    <h2>${s.q.en}</h2><div class="q-id id">${s.q.id}</div>
    <div class="opts">
      ${opts.map((o,i)=>`<button class="opt" onclick="answer(${idx},this)" data-ok="${o.ok?1:0}">
        <span class="key">${String.fromCharCode(65+i)}</span>
        <span class="otext">${o.en}<span class="id">${o.id}</span></span></button>`).join('')}
    </div>
    <div class="feedback" id="fb${idx}"><span class="fi"></span><span><b class="ft"></b><span class="id fx">${s.exp.id}</span></span></div>
  </div></section>`;
}
function rCover(){
  return `<section class="slide"><div class="dark-panel cover">
    <div class="blob b1"></div><div class="blob b2"></div>
    <div class="eyebrow"><span class="dot"></span>Part 2 · Bagian 2</div>
    <h1>Sensors, Actuators<br>&amp; Mini Robots</h1>
    <div class="h1-id">Sensor, Aktuator &amp; Robot Mini</div>
    <p>The story continues where Part 1 left off. Real sensors, real actuators, real photos, and a lot more hands-on building than testing.
      <br><span class="id">Kisahnya berlanjut dari akhir Bagian 1. Sensor nyata, aktuator nyata, foto nyata, dan jauh lebih banyak praktik daripada ujian.</span></p>
    <div class="cta-row">
      <button class="btn btn-primary" onclick="go(1)">Continue the lesson · Lanjutkan ${I.arrow}</button>
      <span class="meta-pill">${QUIZ.length} quiz questions</span>
      <span class="meta-pill">${TASK_COUNT}+ hands-on build tasks</span>
    </div>
  </div></section>`;
}

const nodes=()=>document.querySelectorAll('.slide');
let cur=0,score=0,firstTry=0,answered={},attempts={},g={};
function addPoints(n,small){
  score+=n;
  document.getElementById('scoreVal').textContent=score;
  const chip=document.getElementById('scoreChip');
  chip.classList.remove('bump');void chip.offsetWidth;chip.classList.add('bump');
  const f=document.createElement('span');
  f.className='float-pts '+(small?'small':'big');f.textContent='+'+n;
  chip.appendChild(f);setTimeout(()=>f.remove(),1100);
}
function showSlide(i){
  cur=Math.max(0,Math.min(slides.length-1,i));
  nodes().forEach((n,idx)=>n.classList.toggle('active',idx===cur));
  document.getElementById('curNum').textContent=cur+1;
  document.getElementById('progress').style.width=(cur/(slides.length-1)*100)+'%';
  document.getElementById('backBtn').disabled=cur===0;
  document.getElementById('nextBtn').style.visibility=cur===slides.length-1?'hidden':'visible';
  if(slides[cur].type==='results')fillResults();
  window.scrollTo({top:0,behavior:'smooth'});
}
function go(d){showSlide(cur+d);}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'&&cur<slides.length-1)go(1);
  if(e.key==='ArrowLeft'&&cur>0)go(-1);
});

/* ============================================================
   QUIZ LOGIC
============================================================ */
function answer(idx,btn){
  if(answered[idx])return;
  attempts[idx]=(attempts[idx]||0)+1;
  const fb=document.getElementById('fb'+idx);
  const qi=quizIdxMap[idx];
  if(btn.dataset.ok==='1'){
    answered[idx]=true;
    const t=attempts[idx],pts=tieredPts(t);
    if(t===1)firstTry++;
    g.quizPts=(g.quizPts||0)+pts;
    btn.classList.add('correct','locked');
    btn.parentElement.querySelectorAll('.opt').forEach(o=>{o.classList.add('locked');if(o!==btn&&o.dataset.ok!=='1')o.classList.add('dim');});
    addPoints(pts,false);
    fb.className='feedback ok show';
    fb.querySelector('.fi').innerHTML=I.tick;
    fb.querySelector('.ft').textContent=(t===1?'Perfect, first try! +':'Correct! +')+pts+' — '+QUIZ[qi].exp.en;
  }else{
    btn.classList.add('wrong','locked');
    addPoints(10,true);
    noFb(fb,'+10 for trying — look again!','Coba lihat lagi! Jawaban benar memberi lebih banyak poin.');
  }
}

/* ============================================================
   GENERIC ORDER TASK
============================================================ */
function orderPick(id,btn){
  const spec = ORDERS.find(o=>o.id===id);
  if(!g.orderState[id])g.orderState[id]={pos:0,mistakes:0};
  const st=g.orderState[id];
  const i=+btn.dataset.i;
  const fb=document.getElementById('fb-'+id);
  if(i===st.pos){
    btn.classList.add('used');
    const seq=document.getElementById('seq-'+id);
    if(st.pos===0)seq.innerHTML='';
    if(st.pos>0)seq.insertAdjacentHTML('beforeend',`<span class="arrowsep">${I.arrow}</span>`);
    seq.insertAdjacentHTML('beforeend',`<span class="slot">${spec.steps[i]}</span>`);
    st.pos++;
    if(st.pos===spec.steps.length){
      const pts=Math.max(40,100-15*st.mistakes);
      if(st.mistakes===0)firstTry++;
      addPoints(pts,false);
      okFb(fb,'+'+pts+' — perfectly wired! Nice work.','Rangkaian sempurna! Kerja bagus.');
    }
  }else{
    st.mistakes++;
    btn.classList.add('err');setTimeout(()=>btn.classList.remove('err'),450);
    addPoints(5,true);
    noFb(fb,'+5 — not yet, check the order again.','Belum tepat, periksa urutannya lagi.');
  }
}

/* ============================================================
   GENERIC FILL-IN TASK
============================================================ */
function fillPick(id,btn,ok,text){
  if(g.doneMap[id])return;
  g.triesMap[id]=(g.triesMap[id]||0)+1;
  const fb=document.getElementById('fb-'+id);
  const spec=FILLS.find(f=>f.id===id);
  if(ok){
    g.doneMap[id]=true;
    btn.classList.add('correct','locked');
    document.querySelectorAll('#opts-'+id+' .fillopt').forEach(o=>o.classList.add('locked'));
    document.getElementById('blank-'+id).textContent=text;
    document.getElementById('blank-'+id).classList.add('filled');
    const t=g.triesMap[id],pts=tieredPts(t);
    if(t===1)firstTry++;
    addPoints(pts,false);
    okFb(fb,'+'+pts+' — '+spec.expEn,spec.expId);
  }else{
    btn.classList.add('wrong');setTimeout(()=>btn.classList.remove('wrong'),450);
    addPoints(10,true);
    noFb(fb,'+10 — not quite, read the code again.','Belum pas, baca kodenya lagi.');
  }
}

/* ============================================================
   GENERIC MATCH TASK
============================================================ */
function matchPick(id,btn){
  if(btn.classList.contains('done'))return;
  const spec=MATCH_SENSORS;
  if(!g.matchState[id])g.matchState[id]={sel:null,done:0};
  const st=g.matchState[id];
  if(!st.sel){st.sel=btn;btn.classList.add('sel');return;}
  if(st.sel===btn){btn.classList.remove('sel');st.sel=null;return;}
  if(st.sel.dataset.side===btn.dataset.side){st.sel.classList.remove('sel');st.sel=btn;btn.classList.add('sel');return;}
  const a=st.sel,b=btn;a.classList.remove('sel');
  if(a.dataset.i===b.dataset.i){
    a.classList.add('done');b.classList.add('done');
    st.done++;
    let pts=spec.per; if(st.done===spec.total)pts+=15;
    addPoints(pts,false);
    const hint=document.getElementById('hint-'+id);
    hint.textContent=st.done+' / '+spec.total+' matched · tercocokkan';
    if(st.done===spec.total)hint.textContent='All matched! Sensor superpowers unlocked. · Semua cocok!';
  }else{
    a.classList.add('err');b.classList.add('err');
    setTimeout(()=>{a.classList.remove('err');b.classList.remove('err');},450);
    addPoints(5,true);
  }
  st.sel=null;
}

/* ============================================================
   GENERIC PREDICT TASK
============================================================ */
function predictPick(id,i,ok){
  if(g.doneMap[id])return;
  g.triesMap[id]=(g.triesMap[id]||0)+1;
  const spec=[...PREDICTS].find(p=>p.id===id);
  const line=document.querySelector('#lines-'+id+' [data-i="'+i+'"]');
  const fb=document.getElementById('fb-'+id);
  if(ok){
    g.doneMap[id]=true;
    line.classList.add('used');
    document.querySelectorAll('#lines-'+id+' .chip').forEach(c=>c.classList.add('used'));
    const t=g.triesMap[id],pts=tieredPts(t);
    if(t===1)firstTry++;
    addPoints(pts,false);
    okFb(fb,'+'+pts+' — '+spec.expEn,spec.expId);
  }else{
    line.classList.add('err');setTimeout(()=>line.classList.remove('err'),450);
    addPoints(10,true);
    noFb(fb,'+10 — not this one, think it through again.','Bukan ini, pikirkan lagi.');
  }
}

/* ============================================================
   LAB LOGIC
============================================================ */
function potUpdate(){
  const s=document.getElementById('potSlider');if(!s)return;
  const v=+s.value;
  document.getElementById('potVal').textContent=v;
  document.getElementById('potVolt').textContent=(v/1023*5).toFixed(2)+' V';
  document.getElementById('potNeedle').style.transform=`translate(-50%,-100%) rotate(${(v/1023*270)-135}deg)`;
}
function potCheck(){
  if(g.doneMap['lab-pot'])return;
  const v=+document.getElementById('potSlider').value;
  const fb=document.getElementById('potFb');
  g.triesMap['lab-pot']=(g.triesMap['lab-pot']||0)+1;
  if(Math.abs(v-512)<=40){
    g.doneMap['lab-pot']=true;
    const t=g.triesMap['lab-pot'],pts=tieredPts(t);if(t===1)firstTry++;
    addPoints(pts,false);
    okFb(fb,'+'+pts+' — right in the middle, about 2.5 V.','Tepat di tengah, sekitar 2,5 V.');
  }else{
    addPoints(10,true);
    noFb(fb,'+10 — '+(v<512?'turn it further right.':'turn it further left.'),(v<512?'Putar lebih ke kanan.':'Putar lebih ke kiri.'));
  }
}
function nightUpdate(){
  const s=document.getElementById('nightSlider');if(!s)return;
  const v=+s.value;
  document.getElementById('nightVal').textContent=v;
  const led=document.getElementById('nightLed'),st=document.getElementById('nightStatus');
  if(v<300){
    led.classList.add('on');st.className='status-tag on';st.textContent='LED on — it is dark · LED menyala — sedang gelap';
    if(!g.doneMap['lab-night']){g.doneMap['lab-night']=true;firstTry++;addPoints(100,false);
      okFb(document.getElementById('nightFb'),'+100 — threshold found, the night-light works!','Ambang batas ditemukan, lampu malam berfungsi!');}
  }else{
    led.classList.remove('on');st.className='status-tag off';st.textContent='LED off · Siang hari';
  }
}
function distUpdate(){
  const s=document.getElementById('distSlider');if(!s)return;
  const t=+s.value, d=(t*0.034/2);
  document.getElementById('distTime').textContent=t+' µs';
  document.getElementById('distVal').textContent=d.toFixed(1);
  const st=document.getElementById('distStatus');
  if(d<20){
    st.className='status-tag mid';st.textContent='Too close — robot would stop! · Terlalu dekat — robot akan berhenti!';
    if(!g.doneMap['lab-dist']){g.doneMap['lab-dist']=true;firstTry++;addPoints(100,false);
      okFb(document.getElementById('distFb'),'+100 — you just computed a real distance formula.','Kamu baru saja menghitung rumus jarak sungguhan.');}
  }else{
    st.className='status-tag on';st.textContent='Clear path · Jalur aman';
  }
}
function servoUpdate(){
  const s=document.getElementById('servoSlider');if(!s)return;
  const v=+s.value;
  document.getElementById('servoValTxt').textContent=v;
  document.getElementById('servoArm').style.transform=`translateX(-50%) rotate(${v-90}deg)`;
  if(!g.servoTarget){g.servoTarget=20+Math.floor(Math.random()*140);
    document.getElementById('servoTargetHint').innerHTML='Target: <b>'+g.servoTarget+'&deg;</b> · Target: <b>'+g.servoTarget+'&deg;</b>';}
}
function servoCheck(){
  if(g.doneMap['lab-servo'])return;
  const v=+document.getElementById('servoSlider').value;
  const fb=document.getElementById('servoFb');
  g.triesMap['lab-servo']=(g.triesMap['lab-servo']||0)+1;
  if(Math.abs(v-g.servoTarget)<=8){
    g.doneMap['lab-servo']=true;
    const t=g.triesMap['lab-servo'],pts=tieredPts(t);if(t===1)firstTry++;
    addPoints(pts,false);
    okFb(fb,'+'+pts+' — myServo.write('+v+') locked onto the target.','myServo.write('+v+') tepat mengenai target.');
  }else{
    addPoints(10,true);
    noFb(fb,'+10 — '+(v<g.servoTarget?'aim further right.':'aim further left.'),(v<g.servoTarget?'Arahkan lebih ke kanan.':'Arahkan lebih ke kiri.'));
  }
}
function colorUpdate(){
  const r=document.getElementById('colR');if(!r)return;
  const g_=document.getElementById('colG'),b=document.getElementById('colB');
  document.getElementById('colRv').textContent=r.value;
  document.getElementById('colGv').textContent=g_.value;
  document.getElementById('colBv').textContent=b.value;
  document.getElementById('colorSw').style.background=`rgb(${r.value},${g_.value},${b.value})`;
}
function colorCheck(){
  if(g.doneMap['lab-color'])return;
  const r=+document.getElementById('colR').value,gr=+document.getElementById('colG').value,b=+document.getElementById('colB').value;
  const fb=document.getElementById('colorFb');
  g.triesMap['lab-color']=(g.triesMap['lab-color']||0)+1;
  const close = r>170 && gr>60 && gr<160 && b<60;
  if(close){
    g.doneMap['lab-color']=true;
    const t=g.triesMap['lab-color'],pts=tieredPts(t);if(t===1)firstTry++;
    addPoints(pts,false);
    okFb(fb,'+'+pts+' — that is a warm orange, nicely mixed.','Itu oranye hangat, tercampur dengan baik.');
  }else{
    addPoints(10,true);
    noFb(fb,'+10 — push red higher, keep blue low.','Naikkan merah, jaga biru tetap rendah.');
  }
}

/* ============================================================
   RESULTS
============================================================ */
function fillResults(){
  const MAX = QUIZ.length*100 + TASK_COUNT*100;
  const pct=Math.min(100,Math.round(score/MAX*100));
  const sEl=document.getElementById('resScore');
  clearInterval(window._cnt);
  let shown=0;
  window._cnt=setInterval(()=>{
    shown+=Math.max(1,Math.ceil(score/45));
    if(shown>=score){shown=score;clearInterval(window._cnt);}
    sEl.textContent=shown;
  },22);
  setTimeout(()=>{document.getElementById('ringArc').style.strokeDashoffset=515-(515*pct/100);},150);
  document.getElementById('resPct').textContent='of '+MAX+' · '+pct+'%';
  let lvl,msgEn,msgId,bg;
  if(pct>=85){lvl='Robotics Engineer';bg='#e8ab47';msgEn='Outstanding! Sensors, actuators, logic, robots — you understand the full picture.';msgId='Luar biasa! Sensor, aktuator, logika, robot — kamu paham gambaran lengkapnya.';}
  else if(pct>=65){lvl='Junior Maker';bg='#e8ab47';msgEn='Excellent! You are ready to build a real sensing, moving project.';msgId='Hebat! Kamu siap membangun proyek nyata yang merasakan dan bergerak.';}
  else if(pct>=45){lvl='Rising Builder';bg='#5fd3c7';msgEn='Nice work! One more run and every task will click into place.';msgId='Bagus! Sekali lagi dan semua tugas akan semakin lancar.';}
  else{lvl='Curious Explorer';bg='#5fd3c7';msgEn='Good start! Replay Part 2 — the tasks and quizzes reshuffle every run.';msgId='Awal yang bagus! Ulangi Bagian 2 — tugas dan kuis akan diacak ulang.';}
  document.getElementById('resLevelTxt').textContent=lvl;
  document.getElementById('resLevel').style.background=bg;
  document.getElementById('resMsg').innerHTML=msgEn+'<br><span class="id">'+msgId+'</span>';
  document.getElementById('stQuiz').textContent=g.quizPts||0;
  document.getElementById('stFirst').textContent=firstTry;
}

/* ============================================================
   RESTART
============================================================ */
function restart(){
  score=0;document.getElementById('scoreVal').textContent='0';
  g.servoTarget=null;
  mount();
}

mount();
</script>
